n_d: 8
n_a: 24
n_steps: 3
gamma: 1.3
lambda_sparse: 1.39e-06
n_independent: 2  # 【追加】独立したGLU層数
n_shared: 2       # 【追加】共有されたGLU層数
momentum: 0.02    # 【追加】BNのモメンタム（金融向けに低めに設定）
optimizer_fn: "adam"
optimizer_params:
  lr: 0.002
  weight_decay: 1e-5
mask_type: "entmax"
scheduler_params:
  step_size: 50
  gamma: 0.9
scheduler_fn: "step"
random_state: 42
use_pretrain: True
use_time_decay: True

max_epochs: 100
patience: 15
batch_size: 1024
n_trials: 30
device_name: "cpu"  # Use "cpu" if GPU is not available